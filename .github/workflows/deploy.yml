name: Build and deploy portfolio

# Builds the portfolio from its source repo and publishes it to GitHub Pages.
# Replaces the legacy "Deploy from a branch" pipeline (which fails now that
# Node 20 reached end of life). Requires Pages Source = "GitHub Actions"
# (Settings -> Pages -> Build and deployment -> Source).

on:
  # Manual trigger from the Actions tab.
  workflow_dispatch:
  # Runs when this repo changes (e.g. the workflow itself).
  push:
    branches: [main]

# Least-privilege permissions needed to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout portfolio source
        uses: actions/checkout@v4
        with:
          repository: thiagoolivier/portfolio
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
